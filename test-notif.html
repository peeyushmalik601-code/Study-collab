<!DOCTYPE html>
<html>
<head><title>Notification Test</title></head>
<body style="background:#1a1a2e;color:#fff;font-family:sans-serif;padding:20px;">
  <h2>🔔 Notification Test</h2>
  <button onclick="test()" style="padding:15px 30px;font-size:18px;background:#4facfe;color:#fff;border:none;border-radius:10px;">Test Notification</button>
  <div id="result" style="margin-top:20px;"></div>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDo2oJO2M2EiDKvvBpY2N7b8MZ38WeO5G4",
      authDomain: "study-8820a.firebaseapp.com",
      projectId: "study-8820a",
      storageBucket: "study-8820a.firebasestorage.app",
      messagingSenderId: "599109744780",
      appId: "1:599109744780:web:ffc9c509a0557288dfa3a9"
    });
    const messaging = firebase.messaging();
    
    async function test() {
      const r = document.getElementById('result');
      r.innerHTML = '⏳ Testing...<br><br>';
      
      // Step 1: Permission
      const perm = await Notification.requestPermission();
      r.innerHTML += `1. Permission: <b>${perm}</b><br>`;
      if (perm !== 'granted') { r.innerHTML += '❌ Permission denied!<br>'; return; }
      
      // Step 2: Register SW with CORRECT path (BEFORE getToken)
      try {
        const reg = await navigator.serviceWorker.register('/Study-collab/firebase-messaging-sw.js');
        r.innerHTML += '2. SW Registered: ✅<br>';
        
        // Wait for SW to be ready
        await navigator.serviceWorker.ready;
        r.innerHTML += '3. SW Ready: ✅<br>';
      } catch(e) {
        r.innerHTML += `2. SW Error: ${e.message}<br>`;
        return;
      }
      
      // Step 4: Get Token
      try {
        const token = await messaging.getToken({ 
          vapidKey: 'BAp00Omr4ezHvV-Ukp5NipbaklNXsjGdZmuF0n9MywIZsTZqWLspbCrDEVNxckBnbQDvdT0HzhzvNB4VUdJhOZ4',
          serviceWorkerRegistration: await navigator.serviceWorker.getRegistration()
        });
        if (token) {
          r.innerHTML += '4. Token: ✅ Got it!<br>';
        } else {
          r.innerHTML += '4. Token: ❌ No token<br>';
        }
      } catch(e) {
        r.innerHTML += `4. Token Error: ${e.message}<br>`;
        return;
      }
      
      // Step 5: Test notification
      new Notification('Test Success! 🔔', { 
        body: 'Notification is working perfectly!', 
        icon: 'logo.png',
        vibrate: [200, 100, 200]
      });
      r.innerHTML += '5. Test notification sent! ✅<br>';
      r.innerHTML += '<br><b style="color:#2ed573;">🎉 Everything is working!</b>';
    }
  </script>
</body>
</html>

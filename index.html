<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyCollab - Live Sync</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff}
    .glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,0.12);border-radius:22px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,0.3);margin-bottom:12px}
    .btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50px;padding:14px 26px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap}
    .btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.03)}
    .btn:active{transform:scale(0.96)}
    .btn-primary{background:rgba(74,144,226,0.4);border-color:rgba(74,144,226,0.5)}
    .input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px 18px;color:#fff;outline:none;width:100%;font-size:15px;font-family:'Inter',sans-serif}
    .input::placeholder{color:rgba(255,255,255,0.35)}
    .input:focus{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.13)}
    .dock{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.07);backdrop-filter:blur(35px);border:1px solid rgba(255,255,255,0.18);border-radius:50px;padding:6px 14px;display:flex;gap:6px;z-index:1000;box-shadow:0 12px 48px rgba(0,0,0,0.5)}
    .dock-item{width:46px;height:46px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;border:none;background:transparent;color:rgba(255,255,255,0.55);transition:all 0.2s}
    .dock-item.active{background:rgba(255,255,255,0.22);color:#fff;transform:scale(1.12)}
    .checkbox{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;background:transparent;color:white}
    .checkbox.done{border-color:#2ed573;background:#2ed573}
    .badge{padding:3px 12px;border-radius:18px;font-size:11px;font-weight:600;display:inline-block}
    .badge-high{background:rgba(255,165,0,0.3);color:#ffa502}
    .badge-critical{background:rgba(255,71,87,0.3);color:#ff6b81}
    .badge-medium{background:rgba(74,144,226,0.3);color:#70a1ff}
    .badge-low{background:rgba(46,213,115,0.3);color:#2ed573}
    .prog-bar{background:rgba(255,255,255,0.08);border-radius:15px;height:8px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,#4facfe,#00f2fe);border-radius:15px;transition:width 0.5s}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.4s ease-out}
    .stat-num{font-size:38px;font-weight:900}
    .big-progress{font-size:56px;font-weight:900;background:linear-gradient(to right,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .timer-big{font-size:74px;font-weight:900;letter-spacing:-2px}
    .tabs{display:flex;gap:0;background:rgba(255,255,255,0.04);border-radius:50px;padding:4px;margin-bottom:16px}
    .tab{padding:10px 24px;border-radius:50px;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-weight:600;font-size:14px;font-family:'Inter',sans-serif;transition:all 0.2s;flex:1}
    .tab.active{background:rgba(255,255,255,0.15);color:#fff}
    .room-box{border:1px dashed rgba(255,255,255,0.2);border-radius:16px;padding:16px;margin-bottom:8px}
    .member-tag{font-size:10px;padding:3px 8px;border-radius:10px;display:inline-block}
    .done-tag{background:rgba(46,213,115,0.25);color:#2ed573}
    .pending-tag{background:rgba(255,107,129,0.25);color:#ff6b81}
    @media(max-width:400px){.timer-big{font-size:56px}.big-progress{font-size:42px}.stat-num{font-size:30px}}
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDo2oJO2M2EiDKvvBpY2N7b8MZ38WeO5G4",
      authDomain: "study-8820a.firebaseapp.com",
      projectId: "study-8820a",
      storageBucket: "study-8820a.firebasestorage.app",
      messagingSenderId: "599109744780",
      appId: "1:599109744780:web:ffc9c509a0557288dfa3a9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let user = null, page = 'dashboard', tasks = [], rooms = [], currentRoom = null, roomTasks = [], unsub = null;
    let authMode = 'login';

    function getMyName() { return user?.displayName || user?.email?.split('@')[0] || 'User'; }

    function render() {
      const app = document.getElementById('app');
      if (!user) {
        app.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;"><div class="glass fade-in" style="max-width:400px;width:100%;text-align:center;"><div style="font-size:50px;">📚</div><h1 style="font-size:34px;font-weight:900;background:linear-gradient(to right,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">StudyCollab</h1><p style="opacity:0.5;margin:8px 0 20px;">Study Together • Live Sync</p><div class="tabs"><button class="tab ${authMode==='login'?'active':''}" onclick="authMode='login';render();">Login</button><button class="tab ${authMode==='signup'?'active':''}" onclick="authMode='signup';render();">Sign Up</button></div>${authMode==='signup'?'<input id="aname" class="input" placeholder="Full Name" style="margin-bottom:8px"/>':''}<input id="aemail" class="input" placeholder="Email" style="margin-bottom:8px" type="email"/><input id="apass" class="input" placeholder="Password" style="margin-bottom:8px" type="password"/><button id="auth-btn" class="btn btn-primary" style="width:100%">${authMode==='login'?'🔐 Login':'📝 Sign Up'}</button><div style="opacity:0.3;margin:12px 0;">— or —</div><button id="google-btn" class="btn" style="width:100%">G &nbsp; Continue with Google</button><p style="font-size:12px;opacity:0.4;margin-top:12px" id="auth-msg"></p></div></div>`;
        document.getElementById('auth-btn').onclick = () => {
          const email = document.getElementById('aemail').value, pass = document.getElementById('apass').value;
          const msg = document.getElementById('auth-msg');
          if(!email||!pass){msg.textContent='Fill all fields!';return}
          msg.textContent='Loading...';
          if(authMode==='signup'){
            const name=document.getElementById('aname')?.value||email.split('@')[0];
            auth.createUserWithEmailAndPassword(email,pass).then(res=>res.user.updateProfile({displayName:name})).catch(e=>{msg.textContent=e.message;});
          }else{
            auth.signInWithEmailAndPassword(email,pass).catch(e=>{msg.textContent=e.message;});
          }
        };
        document.getElementById('google-btn').onclick=()=>{const p=new firebase.auth.GoogleAuthProvider();auth.signInWithPopup(p).catch(e=>{document.getElementById('auth-msg').textContent=e.message;});};
        return;
      }
      app.innerHTML = `<header class="glass" style="margin:14px;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;"><span style="font-size:20px;font-weight:800;background:linear-gradient(to right,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">📚 StudyCollab</span><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:13px;opacity:0.7;">👋 ${getMyName()}</span><button class="btn" style="padding:6px 14px;font-size:12px;" onclick="logout()">Exit</button></div></header><main style="padding:0 14px 100px;max-width:550px;margin:0 auto;">${getPage()}</main><div class="dock"><button class="dock-item ${page==='dashboard'?'active':''}" onclick="setPage('dashboard')">📊</button><button class="dock-item ${page==='tasks'?'active':''}" onclick="setPage('tasks')">✅</button><button class="dock-item ${page==='timer'?'active':''}" onclick="setPage('timer')">⏱️</button><button class="dock-item ${page==='friends'?'active':''}" onclick="setPage('friends')">👥</button></div>`;
      setupListeners();
    }

    function getPage() {
      if(page==='dashboard'){
        const done=tasks.filter(t=>t.completed).length,pct=tasks.length?Math.round((done/tasks.length)*100):0;
        return `<div class="fade-in" style="display:flex;flex-direction:column;gap:12px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div class="glass" style="text-align:center;"><div style="opacity:0.5;font-size:12px;">📝 Tasks</div><div class="stat-num">${tasks.length}</div></div><div class="glass" style="text-align:center;"><div style="opacity:0.5;font-size:12px;">✅ Done</div><div class="stat-num" style="color:#2ed573;">${done}</div></div></div><div class="glass" style="text-align:center;"><div style="opacity:0.5;font-size:12px;">PROGRESS</div><div class="big-progress">${pct}%</div><div class="prog-bar" style="margin-top:10px;"><div class="prog-fill" style="width:${pct}%;"></div></div></div>${currentRoom?`<div class="glass"><b>🏠 Active Room: ${currentRoom.name}</b><br><span style="font-size:13px;opacity:0.6;">Invite Code: <b style="color:#4facfe;font-size:16px;">${currentRoom.code}</b></span></div>`:'<div class="glass" style="text-align:center;opacity:0.5;">No room • Go to 👥 Friends</div>'}</div>`;
      }
      if(page==='tasks'){
        return `<div class="fade-in" style="display:flex;flex-direction:column;gap:10px;"><div style="display:flex;gap:8px;"><input id="task-inp" class="input" placeholder="New task..." style="flex:1;"/><select id="task-pri" class="input" style="width:100px;"><option value="medium">Medium</option><option value="low">Low</option><option value="high">High</option><option value="critical">🔥Critical</option></select><button class="btn" onclick="addTask()" style="padding:14px 18px;font-size:20px;">+</button></div>${tasks.map(t=>`<div class="glass" style="display:flex;align-items:center;gap:12px;padding:14px 16px;"><div class="checkbox ${t.completed?'done':''}" onclick="toggleTask('${t.id}')">${t.completed?'✓':''}</div><div style="flex:1;"><div style="font-weight:600;${t.completed?'text-decoration:line-through;opacity:0.4;':''}">${t.title}</div><span class="badge badge-${t.priority}">${t.priority}</span></div><button onclick="deleteTask('${t.id}')" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:18px;cursor:pointer;">✕</button></div>`).join('')||'<p style="text-align:center;opacity:0.4;">No tasks 🎯</p>'}</div>`;
      }
      if(page==='timer'){
        return `<div class="fade-in" style="display:flex;flex-direction:column;align-items:center;gap:24px;"><div style="display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:50px;padding:4px;"><button id="mode-cd" class="btn" style="background:rgba(255,255,255,0.15);" onclick="setTimerMode('countdown')">⏳ Countdown</button><button id="mode-sw" class="btn" style="background:transparent;" onclick="setTimerMode('stopwatch')">⏱️ Stopwatch</button></div><div class="timer-big" id="timer-disp">25:00</div><div style="display:flex;gap:10px;"><button id="timer-btn" class="btn" onclick="toggleTimer()">▶ Start</button><button class="btn" onclick="resetTimer()">↺ Reset</button></div><div style="display:flex;gap:6px;flex-wrap:wrap;">${[5,15,25,50].map(m=>`<button class="btn" style="padding:8px 16px;font-size:13px;" onclick="setPreset(${m})">${m}m</button>`).join('')}</div></div>`;
      }
      if(page==='friends'){
        if(!currentRoom){
          return `<div class="fade-in" style="display:flex;flex-direction:column;gap:12px;"><div class="glass" style="text-align:center;"><div style="font-size:48px;">👥</div><h2 style="font-weight:700;">Study Rooms</h2><p style="opacity:0.5;margin:8px 0 16px;">Create room & invite friends</p><button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="createRoom()">🏠 Create New Room</button><div style="opacity:0.3;margin:12px 0;">— OR JOIN WITH CODE —</div><div style="display:flex;gap:8px;"><input id="code-inp" class="input" placeholder="Enter code" style="flex:1;text-align:center;text-transform:uppercase;letter-spacing:2px;" maxlength="6"/><button class="btn" onclick="joinRoom()">Join Room</button></div></div>${rooms.length>0?`<div class="glass"><h3 style="font-weight:700;margin-bottom:10px;">Your Rooms</h3>${rooms.map(r=>`<div class="room-box" style="cursor:pointer;" onclick="enterRoom('${r.id}')"><b>🏠 ${r.name}</b><br><span style="font-size:12px;opacity:0.5;">Code: <b style="color:#4facfe;">${r.code}</b> | ${r.members.length} members</span></div>`).join('')}</div>`:''}</div>`;
        }
        const members=currentRoom.members||[];
        return `<div class="fade-in" style="display:flex;flex-direction:column;gap:12px;">
          <div class="glass"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div><b style="font-size:18px;">🏠 ${currentRoom.name}</b><br><span style="font-size:14px;opacity:0.6;">Invite Code: <b style="color:#4facfe;font-size:18px;letter-spacing:2px;">${currentRoom.code}</b></span><div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;">${members.map(m=>`<span style="font-size:11px;padding:4px 10px;background:rgba(255,255,255,0.08);border-radius:15px;">👤 ${m} ${m===getMyName()?'(You)':''}</span>`).join('')}</div></div><button class="btn" style="padding:6px 14px;font-size:12px;" onclick="leaveRoom()">Leave</button></div></div>
          <div class="glass"><b>📊 Member Progress</b>${members.map(m=>{const d=roomTasks.filter(t=>t.completions&&t.completions[m]).length;const p=roomTasks.length?Math.round((d/roomTasks.length)*100):0;return`<div style="margin-top:10px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span style="font-weight:600;">${m} ${m===getMyName()?'(You)':''}</span><span style="opacity:0.7;">${d}/${roomTasks.length} • ${p}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${p}%;"></div></div></div>`;}).join('')||'<p style="opacity:0.4;text-align:center;">No tasks yet</p>'}</div>
          <div style="display:flex;gap:8px;"><input id="rt-inp" class="input" placeholder="✍️ Add task for everyone..." style="flex:1;"/><button class="btn btn-primary" onclick="addRoomTask()">+ Add</button></div>
          <h3 style="font-weight:700;">📋 Shared Tasks</h3>
          ${roomTasks.length===0?'<p style="text-align:center;opacity:0.4;">No tasks yet. Add one!</p>':roomTasks.map(t=>`<div class="glass" style="padding:16px;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div class="checkbox ${t.completions&&t.completions[getMyName()]?'done':''}" onclick="toggleRoomTask('${t.id}')">${t.completions&&t.completions[getMyName()]?'✓':''}</div><span style="flex:1;font-weight:600;${t.completions&&t.completions[getMyName()]?'text-decoration:line-through;opacity:0.4;':''}">${t.title}</span><button onclick="deleteRoomTask('${t.id}')" style="background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:16px;">✕</button></div><div style="display:flex;gap:5px;flex-wrap:wrap;">${members.map(m=>`<span class="member-tag ${t.completions&&t.completions[m]?'done-tag':'pending-tag'}">${t.completions&&t.completions[m]?'✅':'❌'} ${m}</span>`).join('')}</div></div>`).join('')}
        </div>`;
      }
    }

    function loadData(){
      if(unsub)unsub();
      unsub=db.collection('tasks').where('userId','==',user.uid).onSnapshot(s=>{tasks=[];s.forEach(d=>tasks.push({id:d.id,...d.data()}));tasks.sort((a,b)=>b.createdAt-a.createdAt);
        db.collection('rooms').onSnapshot(rs=>{rooms=[];rs.forEach(d=>{const data=d.data();if(data.members&&data.members.includes(getMyName()))rooms.push({id:d.id,...data});});if(currentRoom)loadRoom();else render();});
      });
    }

    function loadRoom(){
      if(!currentRoom)return;
      db.collection('rooms').doc(currentRoom.id).onSnapshot(doc=>{if(doc.exists){currentRoom={id:doc.id,...doc.data()};db.collection('roomTasks').where('roomId','==',currentRoom.id).onSnapshot(ts=>{roomTasks=[];ts.forEach(t=>roomTasks.push({id:t.id,...t.data()}));render();});}else{currentRoom=null;render();}});
    }

    async function addTask(){const i=document.getElementById('task-inp'),p=document.getElementById('task-pri');if(!i.value.trim())return;await db.collection('tasks').add({userId:user.uid,title:i.value.trim(),priority:p.value,completed:false,createdAt:Date.now()});i.value='';}
    async function toggleTask(id){const t=tasks.find(x=>x.id===id);if(t)await db.collection('tasks').doc(id).update({completed:!t.completed});}
    async function deleteTask(id){await db.collection('tasks').doc(id).delete();}

    async function createRoom(){const n=prompt('Enter room name:');if(!n||!n.trim())return;const code=Math.random().toString(36).substring(2,8).toUpperCase();const myName=getMyName();const doc=await db.collection('rooms').add({name:n.trim(),code,members:[myName],createdBy:myName,createdAt:Date.now()});currentRoom={id:doc.id,name:n.trim(),code,members:[myName]};alert(`Room created! Share this code: ${code}`);render();}
    async function joinRoom(){const code=document.getElementById('code-inp')?.value?.trim().toUpperCase();if(!code)return alert('Enter code!');const snap=await db.collection('rooms').where('code','==',code).get();if(snap.empty)return alert('Room not found!');const doc=snap.docs[0],data=doc.data();const myName=getMyName();if(!data.members.includes(myName)){data.members.push(myName);await db.collection('rooms').doc(doc.id).update({members:data.members});}currentRoom={id:doc.id,...data,members:data.members};render();}
    async function enterRoom(id){const doc=await db.collection('rooms').doc(id).get();if(doc.exists){currentRoom={id:doc.id,...doc.data()};render();}}
    async function leaveRoom(){if(!currentRoom)return;const myName=getMyName();const members=currentRoom.members.filter(m=>m!==myName);await db.collection('rooms').doc(currentRoom.id).update({members});currentRoom=null;roomTasks=[];render();}
    async function addRoomTask(){if(!currentRoom)return;const inp=document.getElementById('rt-inp');if(!inp||!inp.value.trim())return;const title=inp.value.trim();const members=currentRoom.members||[];const comps={};members.forEach(m=>comps[m]=false);const myName=getMyName();await db.collection('roomTasks').add({roomId:currentRoom.id,title,createdBy:myName,completions:comps,createdAt:Date.now()});inp.value='';}
    async function toggleRoomTask(taskId){const task=roomTasks.find(t=>t.id===taskId);if(!task)return;const myName=getMyName();const comps=task.completions||{};comps[myName]=!comps[myName];await db.collection('roomTasks').doc(taskId).update({completions:comps});}
    async function deleteRoomTask(taskId){if(!confirm('Delete this task for everyone?'))return;await db.collection('roomTasks').doc(taskId).delete();}

    function setPage(p){page=p;render();}
    function logout(){if(unsub)unsub();auth.signOut();}
    function setupListeners(){document.getElementById('task-inp')?.addEventListener('keypress',e=>{if(e.key==='Enter')addTask();});document.getElementById('rt-inp')?.addEventListener('keypress',e=>{if(e.key==='Enter')addRoomTask();});document.getElementById('code-inp')?.addEventListener('keypress',e=>{if(e.key==='Enter')joinRoom();});}

    // TIMER
    let ts=1500,tr=false,tm='countdown',ti=null;
    function ud(){const d=document.getElementById('timer-disp');if(d){const m=Math.floor(ts/60),s=ts%60;d.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}}
    function toggleTimer(){const b=document.getElementById('timer-btn');if(tr){clearInterval(ti);tr=false;b.textContent='▶ Start';return;}if(tm==='countdown'&&ts<=0)return;tr=true;b.textContent='⏸ Pause';ti=setInterval(()=>{tm==='countdown'?ts--:ts++;if(tm==='countdown'&&ts<=0){clearInterval(ti);tr=false;b.textContent='▶ Start';alert('⏰ Done! 🎉');}ud();},1000);}
    function resetTimer(){clearInterval(ti);tr=false;ts=tm==='countdown'?1500:0;document.getElementById('timer-btn').textContent='▶ Start';ud();}
    function setPreset(m){ts=m*60;ud();}
    function setTimerMode(m){tm=m;resetTimer();document.getElementById('mode-cd').style.background=m==='countdown'?'rgba(255,255,255,0.15)':'transparent';document.getElementById('mode-sw').style.background=m==='stopwatch'?'rgba(255,255,255,0.15)':'transparent';}

    auth.onAuthStateChanged(u=>{if(u){user=u;loadData();}else{user=null;render();}});
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>StudyCollab - Study Together</title>
  
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4facfe">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="StudyCollab - Study Together">
  <meta property="og:description" content="Collaborate with friends, track progress, and ace your exams!">
  <meta property="og:image" content="https://peeyushmalik601-code.github.io/Study-collab/logo.png">
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;overflow-x:hidden}
    .glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,0.12);border-radius:22px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,0.3);margin-bottom:12px}
    .btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50px;padding:14px 26px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;outline:none}
    .btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.03)}
    .btn:active{transform:scale(0.96)}
    .btn-primary{background:rgba(74,144,226,0.4);border-color:rgba(74,144,226,0.5)}
    .input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px 18px;color:#fff;outline:none;width:100%;font-size:15px;font-family:'Inter',sans-serif;transition:all 0.3s ease}
    .input::placeholder{color:rgba(255,255,255,0.35)}
    .input:focus{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.13)}
    .dock{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.07);backdrop-filter:blur(35px);border:1px solid rgba(255,255,255,0.18);border-radius:50px;padding:6px 14px;display:flex;gap:6px;z-index:1000;box-shadow:0 12px 48px rgba(0,0,0,0.5)}
    .dock-item{width:46px;height:46px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;border:none;background:transparent;color:rgba(255,255,255,0.55);transition:all 0.2s}
    .dock-item.active{background:rgba(255,255,255,0.22);color:#fff;transform:scale(1.12)}
    .checkbox{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;background:transparent;color:white}
    .checkbox.done{border-color:#2ed573;background:#2ed573}
    .badge{padding:3px 12px;border-radius:18px;font-size:11px;font-weight:600;display:inline-block}
    .badge-high{background:rgba(255,165,0,0.3);color:#ffa502}
    .badge-critical{background:rgba(255,71,87,0.3);color:#ff6b81}
    .badge-medium{background:rgba(74,144,226,0.3);color:#70a1ff}
    .badge-low{background:rgba(46,213,115,0.3);color:#2ed573}
    .prog-bar{background:rgba(255,255,255,0.08);border-radius:15px;height:8px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,#4facfe,#00f2fe);border-radius:15px;transition:width 0.5s}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.4s ease-out}
    .stat-num{font-size:38px;font-weight:900}
    .big-progress{font-size:56px;font-weight:900;background:linear-gradient(to right,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .timer-big{font-size:74px;font-weight:900;letter-spacing:-2px}
    .tabs{display:flex;gap:0;background:rgba(255,255,255,0.04);border-radius:50px;padding:4px;margin-bottom:16px}
    .tab{padding:10px 24px;border-radius:50px;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-weight:600;font-size:14px;font-family:'Inter',sans-serif;transition:all 0.2s;flex:1}
    .tab.active{background:rgba(255,255,255,0.15);color:#fff}
    .room-box{border:1px dashed rgba(255,255,255,0.2);border-radius:16px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
    .room-box:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.4)}
    .member-tag{font-size:10px;padding:3px 8px;border-radius:10px;display:inline-block}
    .done-tag{background:rgba(46,213,115,0.25);color:#2ed573}
    .pending-tag{background:rgba(255,107,129,0.25);color:#ff6b81}
    .notif-badge{position:absolute;top:-6px;right:-6px;background:#ff4757;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:16px;text-align:center}
    .notif-panel{position:fixed;top:80px;right:10px;background:rgba(30,30,60,0.98);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.15);border-radius:16px;width:320px;max-height:400px;overflow-y:auto;z-index:2000;box-shadow:0 20px 60px rgba(0,0,0,0.6);padding:16px;display:none}
    .notif-item{padding:12px;border-radius:12px;margin-bottom:6px;background:rgba(255,255,255,0.04);font-size:13px;transition:all 0.2s}
    .notif-item:hover{background:rgba(255,255,255,0.1)}
    .notif-time{font-size:10px;opacity:0.5;margin-top:4px}
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;animation:fadeIn 0.2s ease-out}
    .modal-box{background:rgba(30,30,60,0.98);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:28px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
    .modal-icon{font-size:48px;margin-bottom:12px}
    .modal-title{font-size:20px;font-weight:700;margin-bottom:8px}
    .modal-text{font-size:14px;opacity:0.7;margin-bottom:20px;line-height:1.5}
    .modal-buttons{display:flex;gap:10px}
    .modal-btn{flex:1;padding:12px 20px;border-radius:50px;border:1px solid rgba(255,255,255,0.2);font-weight:600;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;color:#fff;background:transparent}
    .modal-btn:hover{transform:scale(1.03)}
    .modal-btn-cancel{background:rgba(255,255,255,0.06)}
    .modal-btn-delete{background:rgba(255,71,87,0.35);border-color:rgba(255,71,87,0.5)}
    .modal-btn-leave{background:rgba(255,165,0,0.35);border-color:rgba(255,165,0,0.5)}
    .modal-btn-primary{background:rgba(74,144,226,0.4);border-color:rgba(74,144,226,0.5)}
    .modal-code{font-size:26px;font-weight:900;color:#4facfe;letter-spacing:3px;margin:8px 0}
    .toast{position:fixed;top:20px;right:20px;background:rgba(30,30,60,0.98);backdrop-filter:blur(30px);border-radius:12px;padding:14px 18px;color:#fff;z-index:9998;max-width:320px;animation:fadeIn 0.3s ease-out;font-family:'Inter',sans-serif;box-shadow:0 10px 40px rgba(0,0,0,0.5);border-left:4px solid #4facfe}
    .toast-success{border-left-color:#2ed573}
    .toast-error{border-left-color:#ff4757}
    
    /* ============ SIDE PANEL ============ */
    .menu-btn{
      position:fixed!important;
      bottom:90px!important;
      left:50%!important;
      transform:translateX(-50%)!important;
      width:44px!important;height:44px!important;
      border-radius:50%!important;
      background:linear-gradient(135deg,rgba(255,165,0,0.5),rgba(255,107,129,0.5))!important;
      backdrop-filter:blur(20px)!important;-webkit-backdrop-filter:blur(20px)!important;
      border:1.5px solid rgba(255,255,255,0.4)!important;
      color:#fff!important;cursor:pointer!important;font-size:18px!important;
      z-index:99999!important;
      display:flex!important;align-items:center!important;justify-content:center!important;
      transition:all 0.3s!important;
      box-shadow:0 4px 20px rgba(255,107,129,0.4)!important;
      animation:glow 2s ease-in-out infinite!important;
    }
    @keyframes glow{0%,100%{box-shadow:0 4px 20px rgba(255,107,129,0.4)}50%{box-shadow:0 4px 30px rgba(255,165,0,0.7)}}
    .menu-btn:active{transform:translateX(-50%) scale(0.9)!important}
    
    .side-panel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:5000;display:none}
    .side-panel{position:fixed;top:0;right:-340px;width:320px;height:100%;background:rgba(20,20,50,0.98);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-left:1px solid rgba(255,255,255,0.1);z-index:5001;transition:right 0.35s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;padding:20px;box-shadow:-10px 0 60px rgba(0,0,0,0.5)}
    .side-panel.open{right:0}
    .side-panel-overlay.open{display:block}
    .side-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
    .side-panel-title{font-size:18px;font-weight:700;background:linear-gradient(to right,#ffa502,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .side-panel-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
    .project-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.3s;text-decoration:none;display:block;color:#fff}
    .project-card:hover{background:rgba(255,255,255,0.1);transform:translateX(-4px);border-color:rgba(255,255,255,0.2)}
    .project-icon{font-size:28px;margin-bottom:8px}
    .project-name{font-weight:700;font-size:15px;margin-bottom:4px}
    .project-desc{font-size:11px;opacity:0.5;margin-bottom:6px}
    .project-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;margin-right:4px}
    .tag-web{background:rgba(74,144,226,0.3);color:#70a1ff}
    .tag-tg{background:rgba(46,213,115,0.3);color:#2ed573}
    .tag-game{background:rgba(255,165,0,0.3);color:#ffa502}
    .tag-media{background:rgba(168,85,247,0.3);color:#a855f7}
    
    @media(max-width:400px){.timer-big{font-size:56px}.big-progress{font-size:42px}.stat-num{font-size:30px}.notif-panel{width:90%;left:5%;right:5%}.side-panel{width:280px;right:-300px}}
  </style>
</head>
<body>
  <div id="app"></div>
  
  <!-- ✨ Menu Button - Bottom Center -->
  <button class="menu-btn" id="menu-btn" onclick="openSidePanel()" title="Our Creations">✨</button>
  
  <!-- Side Panel Overlay -->
  <div class="side-panel-overlay" id="side-overlay" onclick="closeSidePanel()"></div>
  
  <!-- Side Panel -->
  <div class="side-panel" id="side-panel">
    <div class="side-panel-header">
      <span class="side-panel-title">✨ Our Creations</span>
      <button class="side-panel-close" onclick="closeSidePanel()">✕</button>
    </div>
    
    <a href="https://peeyushmalik601-code.github.io/Mediaplayer-bawal-h-/" target="_blank" class="project-card">
      <div class="project-icon">🎵</div>
      <div class="project-name">Media Player Bawal</div>
      <div class="project-desc">Premium music player with all features</div>
      <span class="project-tag tag-media">Media</span>
      <span class="project-tag tag-web">Web App</span>
    </a>
    
    <a href="https://peeyushmalik601-code.github.io/3ple-games/" target="_blank" class="project-card">
      <div class="project-icon">🎮</div>
      <div class="project-name">Triple Games</div>
      <div class="project-desc">Gaming website with multiple games</div>
      <span class="project-tag tag-game">Gaming</span>
      <span class="project-tag tag-web">Web App</span>
    </a>
    
    <a href="https://t.me/Triplegames_bot" target="_blank" class="project-card">
      <div class="project-icon">🤖</div>
      <div class="project-name">Triple Games Bot</div>
      <div class="project-desc">Telegram bot for gaming updates</div>
      <span class="project-tag tag-tg">Telegram</span>
      <span class="project-tag tag-game">Bot</span>
    </a>
    
    <div style="text-align:center;opacity:0.4;margin-top:20px;font-size:12px;">
      More coming soon... 🚀
    </div>
  </div>

  <script>
    // ============ SIDE PANEL ============
    function openSidePanel() {
      document.getElementById('side-panel').classList.add('open');
      document.getElementById('side-overlay').classList.add('open');
    }
    function closeSidePanel() {
      document.getElementById('side-panel').classList.remove('open');
      document.getElementById('side-overlay').classList.remove('open');
    }
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', (e) => {
      if (e.changedTouches[0].clientX - touchStartX > 80) closeSidePanel();
    });

    // ============ FIREBASE ============
    const firebaseConfig = {
      apiKey: "AIzaSyDo2oJO2M2EiDKvvBpY2N7b8MZ38WeO5G4",
      authDomain: "study-8820a.firebaseapp.com",
      projectId: "study-8820a",
      storageBucket: "study-8820a.firebasestorage.app",
      messagingSenderId: "599109744780",
      appId: "1:599109744780:web:ffc9c509a0557288dfa3a9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let user=null,page='dashboard',tasks=[],rooms=[],currentRoom=null,roomTasks=[],unsub=null,roomTasksUnsub=null,authMode='login';
    let notifications=[],notifUnsub=null,notifCount=0,notifPanelOpen=false;
    let ts=1500,tr=false,tm='countdown',ti=null;

    function getMyName(){return user?.displayName||user?.email?.split('@')[0]||'User'}

    function showPrompt(title,placeholder,onConfirm){
      const overlay=document.createElement('div');overlay.className='modal-overlay';
      overlay.innerHTML=`<div class="modal-box"><div class="modal-icon">📝</div><div class="modal-title">${title}</div><input id="modal-input" class="input" placeholder="${placeholder}" style="margin:12px 0" autofocus/><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button><button class="modal-btn modal-btn-primary" id="modal-confirm">Create</button></div></div>`;
      document.body.appendChild(overlay);
      const inp=document.getElementById('modal-input');setTimeout(()=>inp.focus(),100);
      document.getElementById('modal-cancel').onclick=()=>overlay.remove();
      document.getElementById('modal-confirm').onclick=()=>{const v=inp.value.trim();if(v){overlay.remove();onConfirm(v)}else{inp.style.borderColor='rgba(255,71,87,0.5)'}};
      inp.addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('modal-confirm').click()});
      overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
    }
    function showAlert(title,message,icon,btnText,onClose){
      const overlay=document.createElement('div');overlay.className='modal-overlay';
      overlay.innerHTML=`<div class="modal-box"><div class="modal-icon">${icon||'✅'}</div><div class="modal-title">${title}</div><div class="modal-text">${message}</div><button class="btn btn-primary" style="width:100%" id="modal-ok">${btnText||'OK'}</button></div>`;
      document.body.appendChild(overlay);
      document.getElementById('modal-ok').onclick=()=>{overlay.remove();if(onClose)onClose()};
      overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
    }
    function showConfirm(title,message,icon,onConfirm,confirmText,confirmClass){
      const overlay=document.createElement('div');overlay.className='modal-overlay';
      overlay.innerHTML=`<div class="modal-box"><div class="modal-icon">${icon||'🗑️'}</div><div class="modal-title">${title}</div><div class="modal-text">${message}</div><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button><button class="modal-btn ${confirmClass||'modal-btn-delete'}" id="modal-confirm">${confirmText||'Delete'}</button></div></div>`;
      document.body.appendChild(overlay);
      document.getElementById('modal-cancel').onclick=()=>overlay.remove();
      document.getElementById('modal-confirm').onclick=()=>{overlay.remove();onConfirm()};
      overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
    }
    function showToast(title,message,type='info'){
      const t=document.createElement('div');t.className=`toast toast-${type}`;
      t.innerHTML=`<b>${title}</b><br><span style="font-size:12px;opacity:0.7">${message}</span>`;
      document.body.appendChild(t);
      setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300)},3000);
    }

    function loadNotifications(){
      if(notifUnsub)notifUnsub();
      notifUnsub=db.collection('notifications').where('userId','==',getMyName()).orderBy('createdAt','desc').limit(20).onSnapshot(s=>{notifications=[];s.forEach(d=>notifications.push({id:d.id,...d.data()}));notifCount=notifications.filter(n=>!n.read).length;render();},err=>{console.error("Notification Error:",err)});
    }
    async function createNotification(userName,type,message,roomId){await db.collection('notifications').add({userId:userName,type,message,roomId,read:false,createdAt:Date.now()});}
    async function markNotifRead(id){await db.collection('notifications').doc(id).update({read:true});}
    async function markAllNotifRead(){for(const n of notifications){if(!n.read)await db.collection('notifications').doc(n.id).update({read:true})}}
    function toggleNotifPanel(){notifPanelOpen=!notifPanelOpen;const p=document.getElementById('notif-panel');if(p)p.style.display=notifPanelOpen?'block':'none';if(!notifPanelOpen)markAllNotifRead();}
    function getTimeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'Just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
    function checkAllDone(){if(!currentRoom||!roomTasks.length)return false;for(const m of(currentRoom.members||[])){if(roomTasks.filter(t=>t.completions&&t.completions[m]).length<roomTasks.length)return false}return true;}

    function render(){
      const app=document.getElementById('app');
      if(!user){
        app.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div class="glass fade-in" style="max-width:400px;width:100%;text-align:center"><div style="font-size:50px">📚</div><h1 style="font-size:34px;font-weight:900;background:linear-gradient(to right,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent">StudyCollab</h1><p style="opacity:0.5;margin:8px 0 20px">Study Together • Live Sync</p><div class="tabs"><button class="tab ${authMode==='login'?'active':''}" onclick="authMode='login';render()">Login</button><button class="tab ${authMode==='signup'?'active':''}" onclick="authMode='signup';render()">Sign Up</button></div>${authMode==='signup'?'<input id="aname" class="input" placeholder="Full Name" style="margin-bottom:8px"/>':''}<input id="aemail" class="input" placeholder="Email" style="margin-bottom:8px" type="email"/><input id="apass" class="input" placeholder="Password" style="margin-bottom:8px" type="password"/><button id="auth-btn" class="btn btn-primary" style="width:100%">${authMode==='login'?'🔐 Login':'📝 Sign Up'}</button><div style="opacity:0.3;margin:12px 0">— or —</div><button id="google-btn" class="btn" style="width:100%">G &nbsp; Continue with Google</button><p style="font-size:12px;opacity:0.4;margin-top:12px" id="auth-msg"></p></div></div>`;
        document.getElementById('auth-btn').onclick=()=>{const e=document.getElementById('aemail').value,p=document.getElementById('apass').value,m=document.getElementById('auth-msg');if(!e||!p){showToast('Error','Please fill all fields','error');return}m.textContent='Loading...';if(authMode==='signup'){const n=document.getElementById('aname')?.value||e.split('@')[0];auth.createUserWithEmailAndPassword(e,p).then(r=>r.user.updateProfile({displayName:n})).catch(err=>{m.textContent=err.message})}else{auth.signInWithEmailAndPassword(e,p).catch(err=>{m.textContent=err.message})}};
        document.getElementById('google-btn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{document.getElementById('auth-msg').textContent=e.message});
        return;
      }
      document.getElementById('menu-btn').style.display='flex';
      app.innerHTML=`<header class="glass" style="margin:14px;display:flex;justify-content:space-between;align-items:center;padding:14px 20px"><span style="font-size:20px;font-weight:800;background:linear-gradient(to right,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent">📚 StudyCollab</span><div style="display:flex;align-items:center;gap:12px"><div style="position:relative;cursor:pointer" onclick="toggleNotifPanel()"><span style="font-size:20px">🔔</span>${notifCount>0?`<span class="notif-badge">${notifCount}</span>`:''}</div><span style="font-size:13px;opacity:0.7">👋 ${getMyName()}</span><button class="btn" style="padding:6px 14px;font-size:12px" onclick="logout()">Exit</button></div></header><div class="notif-panel" id="notif-panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><b>🔔 Notifications</b>${notifCount>0?`<button class="btn" style="padding:4px 12px;font-size:11px" onclick="markAllNotifRead()">Mark all read</button>`:''}</div>${notifications.length===0?'<p style="text-align:center;opacity:0.4;padding:20px">No notifications yet</p>':notifications.map(n=>`<div class="notif-item" style="${!n.read?'border-left:3px solid #4facfe;':''}" onclick="markNotifRead('${n.id}')"><div style="font-weight:${n.read?'400':'600'}">${n.message}</div><div class="notif-time">${getTimeAgo(n.createdAt)}</div></div>`).join('')}</div><main style="padding:0 14px 100px;max-width:550px;margin:0 auto">${getPage()}</main><div class="dock"><button class="dock-item ${page==='dashboard'?'active':''}" onclick="setPage('dashboard')">📊</button><button class="dock-item ${page==='tasks'?'active':''}" onclick="setPage('tasks')">✅</button><button class="dock-item ${page==='timer'?'active':''}" onclick="setPage('timer')">⏱️</button><button class="dock-item ${page==='friends'?'active':''}" onclick="setPage('friends')">👥</button></div>`;
      setupListeners();
    }

    function getPage(){
      if(page==='dashboard'){const d=tasks.filter(t=>t.completed).length,p=tasks.length?Math.round((d/tasks.length)*100):0;return`<div class="fade-in" style="display:flex;flex-direction:column;gap:12px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="glass" style="text-align:center"><div style="opacity:0.5;font-size:12px">📝 Tasks</div><div class="stat-num">${tasks.length}</div></div><div class="glass" style="text-align:center"><div style="opacity:0.5;font-size:12px">✅ Done</div><div class="stat-num" style="color:#2ed573">${d}</div></div></div><div class="glass" style="text-align:center"><div style="opacity:0.5;font-size:12px">PROGRESS</div><div class="big-progress">${p}%</div><div class="prog-bar" style="margin-top:10px"><div class="prog-fill" style="width:${p}%"></div></div></div>${currentRoom?`<div class="glass"><b>🏠 ${currentRoom.name}</b><br><span style="font-size:13px;opacity:0.6">Code: <b style="color:#4facfe;font-size:16px">${currentRoom.code}</b></span></div>`:'<div class="glass" style="text-align:center;opacity:0.5">No room • Go to 👥</div>'}</div>`}
      if(page==='tasks')return`<div class="fade-in" style="display:flex;flex-direction:column;gap:10px"><div style="display:flex;gap:8px"><input id="task-inp" class="input" placeholder="New task..." style="flex:1"/><select id="task-pri" class="input" style="width:100px"><option value="medium">Medium</option><option value="low">Low</option><option value="high">High</option><option value="critical">🔥Critical</option></select><button class="btn" onclick="addTask()" style="padding:14px 18px;font-size:20px">+</button></div>${tasks.map(t=>`<div class="glass" style="display:flex;align-items:center;gap:12px;padding:14px 16px"><div class="checkbox ${t.completed?'done':''}" onclick="toggleTask('${t.id}')">${t.completed?'✓':''}</div><div style="flex:1"><div style="font-weight:600;${t.completed?'text-decoration:line-through;opacity:0.4':''}">${t.title}</div><span class="badge badge-${t.priority}">${t.priority}</span></div><button onclick="deleteTask('${t.id}')" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:18px;cursor:pointer">✕</button></div>`).join('')||'<p style="text-align:center;opacity:0.4">No tasks 🎯</p>'}</div>`;
      if(page==='timer')return`<div class="fade-in" style="display:flex;flex-direction:column;align-items:center;gap:24px"><div style="display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:50px;padding:4px"><button id="mode-cd" class="btn" style="background:rgba(255,255,255,0.15)" onclick="setTimerMode('countdown')">⏳ Countdown</button><button id="mode-sw" class="btn" style="background:transparent" onclick="setTimerMode('stopwatch')">⏱️ Stopwatch</button></div><div class="timer-big" id="timer-disp">25:00</div><div style="display:flex;gap:10px"><button id="timer-btn" class="btn" onclick="toggleTimer()">▶ Start</button><button class="btn" onclick="resetTimer()">↺ Reset</button></div><div style="display:flex;gap:6px;flex-wrap:wrap">${[5,15,25,50].map(m=>`<button class="btn" style="padding:8px 16px;font-size:13px" onclick="setPreset(${m})">${m}m</button>`).join('')}</div></div>`;
      if(page==='friends'){
        if(!currentRoom)return`<div class="fade-in" style="display:flex;flex-direction:column;gap:12px"><div class="glass" style="text-align:center"><div style="font-size:48px">👥</div><h2 style="font-weight:700">Study Rooms</h2><p style="opacity:0.5;margin:8px 0 16px">Create room & invite friends</p><button class="btn btn-primary" style="width:100%;margin-bottom:10px" onclick="createRoom()">🏠 Create New Room</button><div style="opacity:0.3;margin:12px 0">— OR JOIN —</div><div style="display:flex;gap:8px"><input id="code-inp" class="input" placeholder="Code" style="flex:1;text-align:center;text-transform:uppercase;letter-spacing:2px" maxlength="6"/><button class="btn" onclick="joinRoom()">Join</button></div></div>${rooms.length>0?`<div class="glass"><h3 style="font-weight:700;margin-bottom:10px">Your Rooms</h3>${rooms.map(r=>`<div class="room-box" onclick="enterRoom('${r.id}')"><b>🏠 ${r.name}</b><br><span style="font-size:12px;opacity:0.5">Code: <b style="color:#4facfe">${r.code}</b> | ${r.members.length} members</span></div>`).join('')}</div>`:''}</div>`;
        const mem=currentRoom.members||[];
        return`<div class="fade-in" style="display:flex;flex-direction:column;gap:12px"><div class="glass"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><b style="font-size:18px">🏠 ${currentRoom.name}</b><br><span style="font-size:14px;opacity:0.6">Code: <b style="color:#4facfe;font-size:18px;letter-spacing:2px">${currentRoom.code}</b></span><div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap">${mem.map(m=>`<span style="font-size:11px;padding:4px 10px;background:rgba(255,255,255,0.08);border-radius:15px">👤 ${m} ${m===getMyName()?'(You)':''}</span>`).join('')}</div></div><button class="btn" style="padding:6px 14px;font-size:12px" onclick="leaveRoom()">Leave</button></div></div><div class="glass"><b>📊 Progress</b>${mem.map(m=>{const d=roomTasks.filter(t=>t.completions&&t.completions[m]).length,p=roomTasks.length?Math.round((d/roomTasks.length)*100):0;return`<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span style="font-weight:600">${m} ${m===getMyName()?'(You)':''}</span><span style="opacity:0.7">${d}/${roomTasks.length} • ${p}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div></div>`}).join('')||'<p style="opacity:0.4;text-align:center">No tasks</p>'}</div><div style="display:flex;gap:8px"><input id="rt-inp" class="input" placeholder="Add shared task..." style="flex:1"/><button class="btn btn-primary" onclick="addRoomTask()">+ Add</button></div><h3 style="font-weight:700">📋 Tasks (${roomTasks.length})</h3>${roomTasks.length===0?'<p style="text-align:center;opacity:0.4;padding:20px">No tasks yet. Add one! 👆</p>':roomTasks.map(t=>`<div class="glass" style="padding:16px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="checkbox ${t.completions&&t.completions[getMyName()]?'done':''}" onclick="toggleRoomTask('${t.id}')">${t.completions&&t.completions[getMyName()]?'✓':''}</div><span style="flex:1;font-weight:600;${t.completions&&t.completions[getMyName()]?'text-decoration:line-through;opacity:0.4':''}">${t.title}</span><button onclick="deleteRoomTask('${t.id}')" style="background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:16px">✕</button></div><div style="display:flex;gap:5px;flex-wrap:wrap">${mem.map(m=>`<span class="member-tag ${t.completions&&t.completions[m]?'done-tag':'pending-tag'}">${t.completions&&t.completions[m]?'✅':'❌'} ${m}</span>`).join('')}</div></div>`).join('')}</div>`;
      }
    }

    function loadData(){if(unsub)unsub();unsub=db.collection('tasks').where('userId','==',user.uid).onSnapshot(s=>{tasks=[];s.forEach(d=>tasks.push({id:d.id,...d.data()}));tasks.sort((a,b)=>b.createdAt-a.createdAt);db.collection('rooms').onSnapshot(rs=>{rooms=[];rs.forEach(d=>{const data=d.data();if(data.members&&data.members.includes(getMyName()))rooms.push({id:d.id,...data})});if(currentRoom)loadRoomData();else render()})})}
    function loadRoomData(){if(!currentRoom)return;if(roomTasksUnsub)roomTasksUnsub();roomTasksUnsub=db.collection('roomTasks').where('roomId','==',currentRoom.id).onSnapshot(s=>{roomTasks=[];s.forEach(d=>roomTasks.push({id:d.id,...d.data()}));render()});db.collection('rooms').doc(currentRoom.id).onSnapshot(doc=>{if(doc.exists)currentRoom={id:doc.id,...doc.data()};else{currentRoom=null;if(roomTasksUnsub)roomTasksUnsub()}render()})}

    async function addTask(){const i=document.getElementById('task-inp'),p=document.getElementById('task-pri');if(!i.value.trim())return;await db.collection('tasks').add({userId:user.uid,title:i.value.trim(),priority:p.value,completed:false,createdAt:Date.now()});i.value=''}
    async function toggleTask(id){const t=tasks.find(x=>x.id===id);if(t)await db.collection('tasks').doc(id).update({completed:!t.completed})}
    async function deleteTask(id){await db.collection('tasks').doc(id).delete()}
    async function createRoom(){showPrompt('Create New Room','Enter room name...',async(name)=>{const code=Math.random().toString(36).substring(2,8).toUpperCase();const myName=getMyName();const doc=await db.collection('rooms').add({name,code,members:[myName],createdBy:myName,createdAt:Date.now()});currentRoom={id:doc.id,name,code,members:[myName]};showAlert('Room Created! 🎉',`Share this code with friends:<br><div class="modal-code">${code}</div>`,'🏠','OK');loadRoomData()})}
    async function joinRoom(){const code=document.getElementById('code-inp')?.value?.trim().toUpperCase();if(!code){showToast('Oops!','Please enter invite code','error');return}const snap=await db.collection('rooms').where('code','==',code).get();if(snap.empty){showAlert('Not Found','No room with this code.','🔍');return}const doc=snap.docs[0],data=doc.data();const myName=getMyName();if(!data.members.includes(myName)){data.members.push(myName);await db.collection('rooms').doc(doc.id).update({members:data.members})}currentRoom={id:doc.id,...data,members:data.members};showToast('Success!',`Joined: ${data.name}`,'success');loadRoomData()}
    async function enterRoom(id){const doc=await db.collection('rooms').doc(id).get();if(doc.exists){currentRoom={id:doc.id,...doc.data()};loadRoomData()}}
    async function leaveRoom(){if(!currentRoom)return;showConfirm('Leave Room?','Are you sure?','🚪',async()=>{const myName=getMyName();const members=currentRoom.members.filter(m=>m!==myName);await db.collection('rooms').doc(currentRoom.id).update({members});if(roomTasksUnsub)roomTasksUnsub();currentRoom=null;roomTasks=[];render()},'Leave','modal-btn-leave')}
    async function addRoomTask(){if(!currentRoom)return;const inp=document.getElementById('rt-inp');if(!inp||!inp.value.trim())return;const title=inp.value.trim();const mems=currentRoom.members||[];const comps={};mems.forEach(m=>comps[m]=false);await db.collection('roomTasks').add({roomId:currentRoom.id,title,createdBy:getMyName(),completions:comps,createdAt:Date.now()});inp.value='';showToast('Task Added',title,'success')}
    async function toggleRoomTask(taskId){const t=roomTasks.find(x=>x.id===taskId);if(!t)return;const m=getMyName();const comps=t.completions||{};comps[m]=!comps[m];await db.collection('roomTasks').doc(taskId).update({completions:comps});if(comps[m]){const others=(currentRoom.members||[]).filter(x=>x!==m);for(const o of others)await createNotification(o,'task_done',`✅ ${m} completed "${t.title}"`,currentRoom.id);if(checkAllDone())for(const mem of(currentRoom.members||[]))await createNotification(mem,'all_done',`🎉 All tasks done in "${currentRoom.name}"!`,currentRoom.id)}}
    async function deleteRoomTask(taskId){showConfirm('Delete Task?','Remove for everyone?','🗑️',async()=>{await db.collection('roomTasks').doc(taskId).delete();showToast('Deleted','Task removed','success')},'Delete','modal-btn-delete')}

    function setPage(p){page=p;if(p==='friends'&&currentRoom)loadRoomData();render()}
    function logout(){if(unsub)unsub();if(roomTasksUnsub)roomTasksUnsub();if(notifUnsub)notifUnsub();document.getElementById('menu-btn').style.display='none';auth.signOut()}
    function setupListeners(){document.getElementById('task-inp')?.addEventListener('keypress',e=>{if(e.key==='Enter')addTask()});document.getElementById('rt-inp')?.addEventListener('keypress',e=>{if(e.key==='Enter')addRoomTask()});document.getElementById('code-inp')?.addEventListener('keypress',e=>{if(e.key==='Enter')joinRoom()})}

    function ud(){const d=document.getElementById('timer-disp');if(d){const m=Math.floor(ts/60),s=ts%60;d.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}}
    function toggleTimer(){const b=document.getElementById('timer-btn');if(tr){clearInterval(ti);tr=false;b.textContent='▶ Start';return}if(tm==='countdown'&&ts<=0)return;tr=true;b.textContent='⏸ Pause';ti=setInterval(()=>{tm==='countdown'?ts--:ts++;if(tm==='countdown'&&ts<=0){clearInterval(ti);tr=false;b.textContent='▶ Start';ts=0;ud();showAlert('Timer Done! ⏰','Time is up! Take a break.','🎉','OK',()=>{ts=1500;ud()})}ud()},1000)}
    function resetTimer(){clearInterval(ti);tr=false;ts=tm==='countdown'?1500:0;document.getElementById('timer-btn').textContent='▶ Start';ud()}
    function setPreset(m){ts=m*60;ud()}
    function setTimerMode(m){tm=m;resetTimer();document.getElementById('mode-cd').style.background=m==='countdown'?'rgba(255,255,255,0.15)':'transparent';document.getElementById('mode-sw').style.background=m==='stopwatch'?'rgba(255,255,255,0.15)':'transparent'}

    auth.onAuthStateChanged(u=>{if(u){user=u;loadData();loadNotifications();document.getElementById('menu-btn').style.display='flex'}else{user=null;document.getElementById('menu-btn').style.display='none';render()}});
  </script>
</body>
</html>
